version: "3.9"

services:
  backend:
    build: ./fullstack_backend
    ports:
      - "8000:8000"
    env_file:
      - ./fullstack_backend/.env
    depends_on:
      - minio
    networks:
      - app-network

  frontend:
    build: ./fullstack_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - app-network

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO console (веб-интерфейс)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  minio_data:

networks:
  app-network:
    driver: bridge
